services:

  postgres:
    image: postgres:15-alpine
    container_name: workflow-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: workflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d workflow_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./code/jvm
      dockerfile: Dockerfile
    container_name: workflow-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/workflow_db
      DB_USERNAME: admin
      DB_PASSWORD: 1234
      SCRIPTS_DIR: /app/scripts
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:5173
    volumes:
      - ./code/jvm/scripts:/app/scripts
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./code/js
      dockerfile: Dockerfile
    container_name: workflow-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
