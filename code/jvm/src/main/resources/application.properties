# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/workflow_db?currentSchema=public
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:1234}

# Hibernate — auto-create/update tables from @Entity classes (dev only; use validate in prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SHOW_SQL:false}
# Suppress open-in-view warning (we handle transactions explicitly)
spring.jpa.open-in-view=false

# Scheduler dispatch interval
scheduler.dispatch.fixed-delay-ms=10000

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}

# Folder where DEV/ADMIN manually place script files for SCRIPT tasks to run.
app.scripts.base-dir=${SCRIPTS_DIR:./scripts}

# Minimum visible duration of a task run (ms)
app.execution.min-task-running-ms=2000

# HikariCP — increase connection pool to support concurrent virtual-thread executions
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5

