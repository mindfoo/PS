server {
    listen 80;

    # React
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass        http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header  Connection '';
        proxy_buffering   off;
    }
}
